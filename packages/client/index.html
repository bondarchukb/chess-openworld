<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chess Open World</title>
    <style>
      html, body { margin: 0; height: 100%; background: #1b1030; overflow: hidden;
        font-family: system-ui, sans-serif; color: #eee; }
      #hud { position: fixed; top: 10px; left: 12px; z-index: 10; font-size: 13px;
        line-height: 1.5; text-shadow: 0 1px 2px #000; pointer-events: none; }
      #hud b { color: #ffd86b; }
      #board { color: #9fe3ff; margin-top: 4px; }
      kbd { background: #3a2b5c; border-radius: 4px; padding: 1px 5px; }
      #shop { position: fixed; right: 12px; bottom: 12px; z-index: 20; width: 230px;
        background: rgba(27,16,48,0.92); border: 1px solid #4a3a6e; border-radius: 8px;
        padding: 8px 10px; font-size: 13px; pointer-events: auto;
        box-shadow: 0 6px 20px rgba(0,0,0,0.4); }
      #shop .title { font-weight: 600; color: #ffd86b; margin-bottom: 6px; }
      #shop .title small { color: #9b88c0; font-weight: 400; }
      #shop .row { display: flex; justify-content: space-between; align-items: center;
        gap: 8px; padding: 3px 0; }
      #shop button { background: #f7931a; color: #1b1030; border: none; border-radius: 5px;
        padding: 3px 8px; font-weight: 600; cursor: pointer; font-size: 12px; }
      #shop button:hover { filter: brightness(1.1); }
      #shop .inv { margin-top: 8px; padding-top: 8px; border-top: 1px solid #4a3a6e;
        font-size: 12px; line-height: 1.5; }
      #shop .inv code { display: block; color: #9fe3ff; word-break: break-all; margin: 2px 0; }
    </style>
  </head>
  <body>
    <div id="hud">
      <div><b>Chess Open World</b> — move <kbd>WASD</kbd>/<kbd>arrows</kbd> ·
        place <kbd>B</kbd>uilding / <kbd>F</kbd> artifact</div>
      <div><b>drag</b> to roam · <b>scroll</b> to zoom · <kbd>C</kbd> recenter ·
        <kbd>Enter</kbd> take a seat · <b>click</b> a piece then a square to move ·
        <kbd>N</kbd> new game</div>
      <div id="status">connecting…</div>
      <div id="board"></div>
    </div>
    <div id="shop"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
